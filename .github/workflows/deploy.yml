name: Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server ./cmd/api
      - name: Stop backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: sudo systemctl stop lingodeck
      - name: Deploy backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          source: "backend/server,backend/migrations"
          target: "/home/deploy"
      - name: Move files, run migrations and start
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          envs: DATABASE_URL
          script: |
            cp /home/deploy/backend/server /home/deploy/server
            rm -rf /home/deploy/migrations
            cp -r /home/deploy/backend/migrations /home/deploy/migrations
            rm -rf /home/deploy/backend
            gomigrate -path /home/deploy/migrations -database "$DATABASE_URL" up
            sudo systemctl start lingodeck
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Stop frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: sudo systemctl stop lingodeck-front || true
      - name: Clean old frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: rm -rf /var/www/lingodeck/frontend/.next
      - name: Deploy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/.next,frontend/package.json,frontend/package-lock.json"
          target: "/var/www/lingodeck"
      - name: Install deps and start frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/lingodeck/frontend
            npm ci --omit=dev
            sudo systemctl start lingodeck-front
